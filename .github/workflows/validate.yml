name: Validate

on:
  push:
    branches: ["main", "v[0-9]+", "v[0-9]+.[0-9]+"]
    tags-ignore: ["v[0-9]+.[0-9]+.[0-9]+"]
  pull_request:

jobs:
  common-lint:
    uses: anthochamp/dev-toolbox/.github/workflows/common-lint.yml@main
    with:
      node-package-manager: none

  go-lint:
    uses: anthochamp/dev-toolbox/.github/workflows/go-lint.yml@main

  go-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Execute unit tests
        run: go test ./...

      - name: Execute integration tests
        run: ./scripts/test-integration.sh
