name: Publish edge

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Validate only — skip publishing to Docker Hub (dry run)"
        required: false
        type: boolean
        default: false

jobs:
  validate:
    uses: anthochamp/dev-toolbox/.github/workflows/go-validate.yml@main

  publish:
    needs: validate
    if: ${{ !inputs.dry-run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log into Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DHUB_USERNAME }}
          password: ${{ secrets.DHUB_PASSWORD }}

      - name: Publish edge plugin
        run: ./scripts/docker-plugin/release-all.sh edge
