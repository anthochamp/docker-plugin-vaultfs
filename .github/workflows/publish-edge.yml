name: Publish edge

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Validate only — skip publishing to Docker Hub (dry run)"
        required: false
        type: boolean
        default: false

jobs:
  validate:
    uses: anthochamp/dev-toolbox/.github/workflows/go-validate.yml@main

  publish:
    needs: validate
    if: ${{ !inputs.dry-run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log into Docker Hub
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          username: ${{ secrets.DHUB_USERNAME }}
          password: ${{ secrets.DHUB_PASSWORD }}

      - name: Publish edge plugin
        run: ./scripts/docker-plugin/release-all.sh edge
