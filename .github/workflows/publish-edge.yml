name: Publish edge

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Validate only — skip publishing to Docker Hub (dry run)"
        required: false
        type: boolean
        default: false

jobs:
  validate:
    uses: anthochamp/dev-toolbox/.github/workflows/go-validate.yml@main

  publish:
    needs: validate
    if: ${{ !inputs.dry-run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log into Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DHUB_USERNAME }}
          password: ${{ secrets.DHUB_PASSWORD }}

      - name: Publish edge plugin
        run: ./scripts/docker-plugin/release-all.sh edge
