name: Validate & Publish

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

jobs:
  validate:
    uses: anthochamp/dev-toolbox/.github/workflows/go-validate.yml@f18c705206817a77f896fc94a931b6f0f03b3f09 # main

  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log into Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DHUB_USERNAME }}
          password: ${{ secrets.DHUB_PASSWORD }}

      - name: Extract version from tag
        id: version
        run: echo "VALUE=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish versioned plugin
        run: ./scripts/docker-plugin/release-all.sh "${{ steps.version.outputs.VALUE }}"

      - name: Publish latest plugin
        run: ./scripts/docker-plugin/release-all.sh latest
